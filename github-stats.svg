<svg width="495" height="195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="495" height="195" rx="10" fill="#000000"/>
  <rect width="495" height="195" rx="10" fill="url(#grad)"/>

  <!-- Border -->
  <rect width="493" height="193" x="1" y="1" rx="9" fill="none" stroke="#00fff9" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="25" y="35" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#00fff9" filter="url(#glow)">⚡ Ta-syn Islam's GitHub Stats</text>

  <!-- Divider -->
  <line x1="25" y1="45" x2="470" y2="45" stroke="#00fff9" stroke-width="0.5" opacity="0.3"/>

  <!-- Icons + Stats -->
  <!-- Total Stars -->
  <text x="25" y="75" font-family="monospace" font-size="13" fill="#ff2d78">★</text>
  <text x="42" y="75" font-family="'Courier New',monospace" font-size="13" fill="#aaaaaa">Total Stars Earned:</text>
  <text x="340" y="75" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Total Commits -->
  <text x="25" y="100" font-family="monospace" font-size="13" fill="#ff2d78">↑</text>
  <text x="42" y="100" font-family="'Courier New',monospace" font-size="13" fill="#aaaaaa">Total Commits (2025):</text>
  <text x="340" y="100" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" font-weight="bold">61+</text>

  <!-- Total PRs -->
  <text x="25" y="125" font-family="monospace" font-size="13" fill="#ff2d78">⌥</text>
  <text x="42" y="125" font-family="'Courier New',monospace" font-size="13" fill="#aaaaaa">Total PRs:</text>
  <text x="340" y="125" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Total Issues -->
  <text x="25" y="150" font-family="monospace" font-size="13" fill="#ff2d78">◎</text>
  <text x="42" y="150" font-family="'Courier New',monospace" font-size="13" fill="#aaaaaa">Total Issues:</text>
  <text x="340" y="150" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" font-weight="bold">0</text>

  <!-- Contributed to -->
  <text x="25" y="175" font-family="monospace" font-size="13" fill="#ff2d78">◈</text>
  <text x="42" y="175" font-family="'Courier New',monospace" font-size="13" fill="#aaaaaa">Contributed to (last year):</text>
  <text x="340" y="175" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" font-weight="bold">3</text>

  <!-- Rank badge -->
  <circle cx="445" cy="110" r="35" fill="none" stroke="#00fff9" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="445" cy="110" r="35" fill="none" stroke="#ff2d78" stroke-width="1.5" stroke-dasharray="110 220" opacity="0.7" filter="url(#glow)"/>
  <text x="445" y="105" font-family="monospace" font-size="11" fill="#aaaaaa" text-anchor="middle">RANK</text>
  <text x="445" y="122" font-family="monospace" font-size="18" fill="#00fff9" text-anchor="middle" font-weight="bold" filter="url(#glow)">B+</text>
</svg>
