<svg width="760" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#aa00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="160" rx="12" ry="12" fill="#0a0015"/>

  <!-- Neon border -->
  <rect width="758" height="158" x="1" y="1" rx="11" ry="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- Corner accents -->
  <line x1="0" y1="20" x2="0" y2="0" stroke="#00fff9" stroke-width="3" filter="url(#glow-cyan)"/>
  <line x1="0" y1="0" x2="20" y2="0" stroke="#00fff9" stroke-width="3" filter="url(#glow-cyan)"/>
  <line x1="760" y1="140" x2="760" y2="160" stroke="#ff2d78" stroke-width="3" filter="url(#glow-pink)"/>
  <line x1="740" y1="160" x2="760" y2="160" stroke="#ff2d78" stroke-width="3" filter="url(#glow-pink)"/>

  <!-- Opening quote mark -->
  <text x="22" y="45" font-family="monospace" font-size="36" fill="#00fff9" filter="url(#glow-cyan)" opacity="0.9">"</text>

  <!-- Quote lines -->
  <text x="48" y="52" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" letter-spacing="0.3">The code you write makes you a programmer.</text>
  <text x="48" y="76" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" letter-spacing="0.3">The code you delete makes you a good one.</text>
  <text x="48" y="100" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" letter-spacing="0.3">The code you don't have to write makes you a great one.</text>

  <!-- Closing quote mark -->
  <text x="710" y="108" font-family="monospace" font-size="36" fill="#ff2d78" filter="url(#glow-pink)" opacity="0.9">"</text>

  <!-- Divider line -->
  <line x1="48" y1="118" x2="712" y2="118" stroke="#aa00ff" stroke-width="0.5" opacity="0.5"/>

  <!-- Author -->
  <text x="712" y="140" font-family="'Courier New', monospace" font-size="13" fill="#ff2d78" text-anchor="end" filter="url(#glow-pink)" letter-spacing="0.5">— Mario Fusco</text>
</svg>
