<svg width="350" height="195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00fff9;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="350" height="195" rx="10" fill="#000000"/>
  <rect width="350" height="195" rx="10" fill="url(#grad2)"/>
  <rect width="348" height="193" x="1" y="1" rx="9" fill="none" stroke="#ff2d78" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="20" y="35" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#00fff9" filter="url(#glow2)">◈ Most Used Languages</text>
  <line x1="20" y1="45" x2="330" y2="45" stroke="#ff2d78" stroke-width="0.5" opacity="0.3"/>

  <!-- TypeScript -->
  <rect x="20" y="57" width="8" height="8" rx="2" fill="#3178C6"/>
  <text x="34" y="66" font-family="'Courier New',monospace" font-size="12" fill="#cccccc">TypeScript</text>
  <text x="260" y="66" font-family="'Courier New',monospace" font-size="12" fill="#3178C6" font-weight="bold">58.2%</text>
  <rect x="20" y="70" width="310" height="5" rx="2" fill="#1a1a2e"/>
  <rect x="20" y="70" width="180" height="5" rx="2" fill="#3178C6" opacity="0.8"/>

  <!-- JavaScript -->
  <rect x="20" y="88" width="8" height="8" rx="2" fill="#F7DF1E"/>
  <text x="34" y="97" font-family="'Courier New',monospace" font-size="12" fill="#cccccc">JavaScript</text>
  <text x="260" y="97" font-family="'Courier New',monospace" font-size="12" fill="#F7DF1E" font-weight="bold">29.1%</text>
  <rect x="20" y="101" width="310" height="5" rx="2" fill="#1a1a2e"/>
  <rect x="20" y="101" width="90" height="5" rx="2" fill="#F7DF1E" opacity="0.8"/>

  <!-- HTML -->
  <rect x="20" y="119" width="8" height="8" rx="2" fill="#E34F26"/>
  <text x="34" y="128" font-family="'Courier New',monospace" font-size="12" fill="#cccccc">HTML</text>
  <text x="260" y="128" font-family="'Courier New',monospace" font-size="12" fill="#E34F26" font-weight="bold">7.4%</text>
  <rect x="20" y="132" width="310" height="5" rx="2" fill="#1a1a2e"/>
  <rect x="20" y="132" width="23" height="5" rx="2" fill="#E34F26" opacity="0.8"/>

  <!-- CSS -->
  <rect x="20" y="150" width="8" height="8" rx="2" fill="#aa00ff"/>
  <text x="34" y="159" font-family="'Courier New',monospace" font-size="12" fill="#cccccc">CSS</text>
  <text x="260" y="159" font-family="'Courier New',monospace" font-size="12" fill="#aa00ff" font-weight="bold">3.2%</text>
  <rect x="20" y="163" width="310" height="5" rx="2" fill="#1a1a2e"/>
  <rect x="20" y="163" width="10" height="5" rx="2" fill="#aa00ff" opacity="0.8"/>

  <!-- Java -->
  <rect x="20" y="181" width="8" height="8" rx="2" fill="#ED8B00"/>
  <text x="34" y="187" font-family="'Courier New',monospace" font-size="11" fill="#cccccc">Java</text>
  <text x="260" y="187" font-family="'Courier New',monospace" font-size="11" fill="#ED8B00" font-weight="bold">2.1%</text>
</svg>
